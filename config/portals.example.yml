# Career-Ops Portal Configuration
# Copy this file to portals.yml in your career-ops root directory.
# Customized for: Ahsan Khan - Senior Software Engineer
# Focus: Saudi Arabia (Riyadh), Remote, Fintech, React/MERN/Laravel

# =============================================================================
# TITLE FILTERS
# =============================================================================
# Keywords to INCLUDE/EXCLUDE when scanning job titles

title_filter:
  # Positive keywords - jobs matching these will be included
  positive:
    - "Software Engineer"
    - "Senior Software Engineer"
    - "Staff Software Engineer"
    - "Full Stack"
    - "Fullstack"
    - "Frontend"
    - "Front End"
    - "Front-End"
    - "React"
    - "React.js"
    - "ReactJS"
    - "Node.js"
    - "Node"
    - "TypeScript"
    - "JavaScript"
    - "MERN"
    - "Laravel"
    - "PHP"
    - "Web Developer"
    - "Web Engineer"
    - "Product Engineer"

  # Negative keywords - jobs matching these will be excluded
  negative:
    - "Intern"
    - "Internship"
    - "Junior"
    - "Entry Level"
    - "Graduate"
    - "Trainee"
    - "iOS"
    - "Android"
    - "Mobile Developer"
    - "Mobile Engineer"
    - "Data Scientist"
    - "Data Engineer"
    - "ML Engineer"
    - "Machine Learning"
    - "DevOps"
    - "SRE"
    - "Site Reliability"
    - "Security Engineer"
    - "QA Engineer"
    - "Test Engineer"
    - "Embedded"
    - "Hardware"
    - "Firmware"
    - "C++"
    - "Rust"
    - "Golang"
    - "Java Developer"
    - "SAP"
    - "Salesforce Developer"
    - "ServiceNow"

