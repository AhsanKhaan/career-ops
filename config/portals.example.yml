# =============================================================================
# SCAN SETTINGS
# =============================================================================

scan_settings:
  # How often to scan (in days)
  scan_interval: 3
  
  # Maximum offers to process per scan
  max_offers_per_scan: 50
  
  # Minimum score to auto-generate PDF (out of 5)
  auto_pdf_threshold: 3.5
  
  # Skip offers older than X days
  max_offer_age_days: 30

# =============================================================================
# LOCATION PREFERENCES
# =============================================================================

location_preferences:
  # Primary targets
  primary:
    - "Riyadh, Saudi Arabia"
    - "Remote"
    - "Remote - Worldwide"
    - "Remote - EMEA"
    - "Remote - Middle East"
  
  # Secondary targets  
  secondary:
    - "Dubai, UAE"
    - "Abu Dhabi, UAE"
    - "Berlin, Germany"
    - "Amsterdam, Netherlands"
    - "London, UK"
  
  # Keywords that indicate remote-friendly
  remote_indicators:
    - "Remote"
    - "Work from anywhere"
    - "Distributed"
    - "Remote-first"
    - "Fully remote"
    - "Global"
    - "Worldwide"

# =============================================================================
# VISA & SPONSORSHIP
# =============================================================================

visa_requirements:
  # Must have one of these
  required_keywords:
    - "visa sponsorship"
    - "relocation"
    - "relocation assistance"
    - "work permit"
    - "sponsorship available"
    - "open to international"
    - "global candidates"
  
  # Auto-reject if contains
  reject_keywords:
    - "no visa sponsorship"
    - "must be authorized to work"
    - "US citizens only"
    - "EU work authorization required"
    - "local candidates only"
    - "must have existing right to work"
